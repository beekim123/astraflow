services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astraflow
      POSTGRES_USER: astraflow
      POSTGRES_PASSWORD: astraflow
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astraflow -d astraflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - astraflow_net

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    networks:
      - astraflow_net

  llm-provider:
    profiles: ["full"]
    build:
      context: ../backend
    env_file:
      - path: ./env/.env.local
        required: false
    environment:
      SERVICE_NAME: llm-provider
      APP_ENV: local
      AI_GATEWAY_INTERNAL_TOKEN: local-dev-token
    ports:
      - "18082:8020"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8020/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: uvicorn app.services.llm_provider.main:app --host 0.0.0.0 --port 8020
    networks:
      - astraflow_net

  ai-gateway:
    profiles: ["full"]
    build:
      context: ../backend
    env_file:
      - path: ./env/.env.local
        required: false
    environment:
      SERVICE_NAME: ai-gateway
      APP_ENV: local
      SECRET_KEY: local-dev-secret
      DATABASE_URL: postgresql+asyncpg://astraflow:astraflow@postgres:5432/astraflow
      REDIS_URL: redis://redis:6379/0
      AI_GATEWAY_INTERNAL_TOKEN: local-dev-token
      AI_GATEWAY_TIMEOUT_SECONDS: "120"
      LLM_PROVIDER_URL: http://llm-provider:8020
    ports:
      - "18081:8010"
    depends_on:
      postgres:
        condition: service_healthy
      llm-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: uvicorn app.services.ai_gateway.main:app --host 0.0.0.0 --port 8010
    networks:
      - astraflow_net

  backend:
    profiles: ["full"]
    build:
      context: ../backend
    env_file:
      - path: ./env/.env.local
        required: false
    environment:
      SERVICE_NAME: backend-api
      APP_ENV: local
      SECRET_KEY: local-dev-secret
      DATABASE_URL: postgresql+asyncpg://astraflow:astraflow@postgres:5432/astraflow
      REDIS_URL: redis://redis:6379/0
      AI_GATEWAY_URL: http://ai-gateway:8010
      AI_GATEWAY_INTERNAL_TOKEN: local-dev-token
      AI_GATEWAY_TIMEOUT_SECONDS: "120"
      CORS_ORIGINS: http://localhost:17300,http://localhost:17301,http://localhost:17302,http://localhost:17303,http://localhost:17304,http://localhost:17305,http://localhost:17306,http://localhost:18000
      GATE_COOKIE_SECURE: "false"
      UPLOAD_DIR: var/uploads
      UPLOAD_IMAGE_MAX_MB: "10"
      UPLOAD_FILE_MAX_MB: "50"
      UPLOAD_VIDEO_MAX_MB: "200"
    ports:
      - "18080:8000"
    volumes:
      - backend_uploads:/app/var/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: sh -c "alembic upgrade head && python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - astraflow_net

  portal-shell:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/portal-shell dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
      VITE_APP_ADMIN_URL: http://localhost:18000/micro/admin/
      VITE_APP_CHAT_URL: http://localhost:18000/micro/chat/
      VITE_APP_AUDIT_URL: http://localhost:18000/micro/audit/
      VITE_APP_TICKET_URL: http://localhost:18000/micro/ticket/
      VITE_APP_CUSTOMER_H5_URL: http://localhost:18000/micro/customer/
      VITE_APP_MARKETING_URL: http://localhost:18000/micro/marketing/
    networks:
      - astraflow_net

  app-admin:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/app-admin dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
    networks:
      - astraflow_net

  app-chat:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/app-chat dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
    networks:
      - astraflow_net

  app-audit:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/app-audit dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
    networks:
      - astraflow_net

  app-ticket:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/app-ticket dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
    networks:
      - astraflow_net

  app-customer-h5:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/app-customer-h5 dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
    networks:
      - astraflow_net

  app-marketing:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: frontend/Dockerfile.dev
    command: pnpm --filter @astraflow/app-marketing dev
    environment:
      VITE_API_BASE_URL: http://localhost:18000/api
      VITE_PORTAL_URL: http://localhost:18000
    networks:
      - astraflow_net

  nginx:
    profiles: ["full"]
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "18000:80"
    networks:
      - astraflow_net
    depends_on:
      - backend
      - ai-gateway
      - llm-provider
      - portal-shell
      - app-admin
      - app-chat
      - app-audit
      - app-ticket
      - app-customer-h5
      - app-marketing

networks:
  astraflow_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
