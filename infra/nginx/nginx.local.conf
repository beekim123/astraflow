map "$cookie_gate_passed:$http_upgrade" $gate_blocked {
  default 1;
  ~^true: 0;
  ~*:websocket$ 0;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name localhost;
  client_max_body_size 200m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  location /api/security/ {
    proxy_pass http://backend:8000/api/security/;
  }

  location = /api/health {
    proxy_pass http://backend:8000/api/health;
  }

  location ~ ^/api/chat/conversations/[^/]+/messages/stream$ {
    default_type text/event-stream;
    if ($gate_blocked) {
      return 403 '{"code":40010,"message":"У»итЁѕт«їТѕљУ«┐жЌ«жЌеудЂ","data":null}';
    }
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    add_header X-Accel-Buffering no always;
    proxy_pass http://backend:8000;
  }

  location /api/ {
    default_type application/json;
    if ($gate_blocked) {
      return 403 '{"code":40010,"message":"У»итЁѕт«їТѕљУ«┐жЌ«жЌеудЂ","data":null}';
    }
    proxy_pass http://backend:8000/api/;
  }

  location = /micro/admin {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-admin:17301/micro/admin/;
  }

  location /micro/admin/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-admin:17301;
  }

  location = /micro/chat {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-chat:17302/micro/chat/;
  }

  location /micro/chat/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-chat:17302;
  }

  location = /micro/audit {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-audit:17303/micro/audit/;
  }

  location /micro/audit/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-audit:17303;
  }

  location = /micro/ticket {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-ticket:17304/micro/ticket/;
  }

  location /micro/ticket/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-ticket:17304;
  }

  location = /micro/customer {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-customer-h5:17305/micro/customer/;
  }

  location /micro/customer/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-customer-h5:17305;
  }

  location = /micro/marketing {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-marketing:17306/micro/marketing/;
  }

  location /micro/marketing/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://app-marketing:17306;
  }

  location /@vite/ {
    proxy_pass http://portal-shell:17300;
  }

  location /@id/ {
    proxy_pass http://portal-shell:17300;
  }

  location /@fs/ {
    proxy_pass http://portal-shell:17300;
  }

  location /src/ {
    proxy_pass http://portal-shell:17300;
  }

  location /node_modules/ {
    proxy_pass http://portal-shell:17300;
  }

  location = /__vite_ping {
    proxy_pass http://portal-shell:17300;
  }

  location /gate {
    proxy_pass http://portal-shell:17300;
  }

  location / {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    proxy_pass http://portal-shell:17300/;
  }
}
