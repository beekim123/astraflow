map $cookie_gate_passed $gate_blocked {
  default 1;
  "true" 0;
}

upstream backend_api {
  server backend:8000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 50m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location = /api/health {
    proxy_pass http://backend_api/api/health;
  }

  location /api/security/ {
    proxy_pass http://backend_api/api/security/;
  }

  location /api/ {
    default_type application/json;
    if ($gate_blocked) {
      return 403 '{"code":40010,"message":"请先完成访问门禁","data":null}';
    }
    proxy_pass http://backend_api/api/;
  }

  location = /gate {
    try_files /index.html =404;
  }

  location /assets/ {
    try_files $uri =404;
  }

  location = /favicon.ico {
    try_files $uri =404;
  }

  location = /micro/admin {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    return 301 /micro/admin/;
  }

  location /micro/admin/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /micro/admin/index.html;
  }

  location = /micro/chat {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    return 301 /micro/chat/;
  }

  location /micro/chat/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /micro/chat/index.html;
  }

  location = /micro/audit {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    return 301 /micro/audit/;
  }

  location /micro/audit/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /micro/audit/index.html;
  }

  location = /micro/ticket {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    return 301 /micro/ticket/;
  }

  location /micro/ticket/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /micro/ticket/index.html;
  }

  location = /micro/customer {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    return 301 /micro/customer/;
  }

  location /micro/customer/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /micro/customer/index.html;
  }

  location = /micro/marketing {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    return 301 /micro/marketing/;
  }

  location /micro/marketing/ {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /micro/marketing/index.html;
  }

  location / {
    if ($gate_blocked) {
      return 302 $scheme://$http_host/gate?redirect=$request_uri;
    }
    try_files $uri $uri/ /index.html;
  }
}
